<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Totalmente Naranja</title>
    <style>
        /* FONDO: Naranja vibrante con degradado */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #ffb347 0%, #ffcc33 100%); 
            margin: 0; 
        }

        /* CUADRO: Naranja oscuro para contrastar con el fondo */
        .card { 
            background: #ff6a00; /* Naranja fuerte e intenso */
            padding: 2.5rem; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); /* Sombra más pronunciada */
            width: 100%; 
            max-width: 380px; 
            border: 2px solid rgba(255, 255, 255, 0.2); /* Borde sutil claro */
        }

        /* Títulos en blanco para legibilidad */
        h2 { text-align: center; color: white; margin-bottom: 1.5rem; font-weight: 700; }
        
        /* Párrafo de recuperación en blanco */
        p { font-size: 0.85rem; color: #fdfdfd; text-align: center; margin-bottom: 10px; }

        /* Campos de entrada mantenidos en blanco */
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1rem; 
            background-color: white; 
            color: #333; 
        }
        
        /* Botón azul original mantenido para contraste (puedes cambiarlo si quieres) */
        button { 
            width: 100%; 
            padding: 14px; 
            background: #1877f2; /* Azul para resaltar */
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1.1rem; 
            font-weight: bold; 
            margin-top: 15px; 
            transition: background 0.3s ease;
        }
        button:hover { background: #166fe5; }
        
        /* Mensajes de Alerta */
        #message-box {
            display: none;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            text-align: center;
            font-weight: bold;
        }
        .error { background-color: #ffebe9; color: #d93025; border: 1px solid #ff8080; }
        .success { background-color: #e6ffed; color: #22863a; border: 1px solid #34d058; }
        
        /* Enlaces inferiores en blanco */
        .footer-links { text-align: center; margin-top: 20px; font-size: 0.9rem; }
        .link { 
            color: white; /* Enlaces en blanco */
            cursor: pointer; 
            text-decoration: none; 
            display: block; 
            margin: 8px 0; 
            font-weight: 600;
        }
        .link:hover { text-decoration: underline; color: #f0f0f0; }
    </style>
</head>
<body>

    <div class="card">
        <div id="message-box"></div>

        <div id="section-register">
            <h2>Crear Cuenta</h2>
            <form onsubmit="handleAuth(event, '/api/register')">
                <input type="email" id="reg-email" placeholder="Correo electrónico" required>
                <input type="password" id="reg-password" placeholder="Contraseña" required>
                <button type="submit">Registrarse</button>
            </form>
            <div class="footer-links">
                <span class="link" onclick="toggleView('section-login')">¿Ya tienes cuenta? Inicia sesión</span>
            </div>
        </div>

        <div id="section-login" style="display:none;">
            <h2>Iniciar Sesión</h2>
            <form onsubmit="handleAuth(event, '/api/login')">
                <input type="email" id="login-email" placeholder="Correo electrónico" required>
                <input type="password" id="login-password" placeholder="Contraseña" required>
                <button type="submit">Entrar</button>
            </form>
            <div class="footer-links">
                <span class="link" onclick="toggleView('section-register')">¿No tienes cuenta? Regístrate</span>
                <span class="link" onclick="toggleView('section-recovery')">Olvidé mi contraseña</span>
            </div>
        </div>

        <div id="section-recovery" style="display:none;">
            <h2>Recuperar Cuenta</h2>
            <p>Escribe tu correo para enviarte las instrucciones.</p>
            <form onsubmit="handleAuth(event, '/api/forgot-password')">
                <input type="email" id="recover-email" placeholder="Correo electrónico" required>
                <button type="submit">Enviar enlace</button>
            </form>
            <div class="footer-links">
                <span class="link" onclick="toggleView('section-login')">Volver al inicio</span>
            </div>
        </div>
    </div>

    <script>
        // Función para cambiar entre formularios
        function toggleView(viewId) {
            document.getElementById('section-register').style.display = 'none';
            document.getElementById('section-login').style.display = 'none';
            document.getElementById('section-recovery').style.display = 'none';
            document.getElementById(viewId).style.display = 'block';
            document.getElementById('message-box').style.display = 'none';
        }

        // Función universal para enviar datos a Python
        async function handleAuth(event, route) {
            event.preventDefault();
            const messageBox = document.getElementById('message-box');
            messageBox.style.display = 'none'; // Ocultar mensaje previo
            
            // Determinar qué inputs leer basado en la ruta
            let email, password;
            if (route === '/api/register') {
                email = document.getElementById('reg-email').value;
                password = document.getElementById('reg-password').value;
            } else if (route === '/api/login') {
                email = document.getElementById('login-email').value;
                password = document.getElementById('login-password').value;
            } else {
                email = document.getElementById('recover-email').value;
            }

            try {
                const response = await fetch(route, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    messageBox.textContent = data.message;
                    messageBox.className = "success";
                    messageBox.style.display = "block";
                    if(route === '/api/login') {
                        setTimeout(() => alert("¡Éxito! Iniciando sesión..."), 500);
                        // window.location.href = "/dashboard";
                    }
                } else {
                    // Muestra el error que manda Python (400, 401, etc.)
                    messageBox.textContent = data.message || "Ocurrió un error";
                    messageBox.className = "error";
                    messageBox.style.display = "block";
                }
            } catch (error) {
                messageBox.textContent = "Error de conexión con el servidor";
                messageBox.className = "error";
                messageBox.style.display = "block";
            }
        }
    </script>
</body>
</html>
